<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

// ── Tweaks defaults ────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "serif": "Newsreader",
  "mono": "JetBrains Mono",
  "accent": "#d4a14a",
  "density": "regular",
  "starfield": true,
  "liveTickRate": 5
}/*EDITMODE-END*/;

// Available font options
const SERIFS = {
  "Newsreader": `"Newsreader", "Source Serif 4", Georgia, serif`,
  "Fraunces":   `"Fraunces", "Newsreader", Georgia, serif`,
  "Source Serif 4": `"Source Serif 4", "Newsreader", Georgia, serif`,
  "Spectral":   `"Spectral", "Newsreader", Georgia, serif`,
};
const MONOS = {
  "JetBrains Mono": `"JetBrains Mono", ui-monospace, monospace`,
  "IBM Plex Mono":  `"IBM Plex Mono", ui-monospace, monospace`,
};

const ACCENT_OPTIONS = [
  "#d4a14a", // Aglaea gold
  "#e2b35a", // brighter gold
  "#b8842e", // deeper gold
  "#c98a5b", // copper
  "#4d918a", // teal (Aglaea's eyes)
  "#d97757", // coral
];

// ── Hash router ────────────────────────────────────────────────
function useHashRoute() {
  const [route, setRoute] = useState(() => normalizeHash(location.hash));
  useEffect(() => {
    const onHash = () => setRoute(normalizeHash(location.hash));
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  const go = useCallback((path) => {
    location.hash = path === "/" ? "" : path.startsWith("/") ? path : "/" + path;
  }, []);
  return [route, go];
}
function normalizeHash(h) {
  if (!h || h === "#") return "/";
  if (h.startsWith("#")) h = h.slice(1);
  if (!h.startsWith("/")) h = "/" + h;
  return h;
}

// ── Live tick (forces re-render so "n minutes ago" advances) ──
function useLiveTick(rateSeconds) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const ms = Math.max(1, rateSeconds) * 1000;
    const id = setInterval(() => setTick(t => t + 1), ms);
    return () => clearInterval(id);
  }, [rateSeconds]);
  return tick;
}

// ── Route resolution ──────────────────────────────────────────
function resolveRoute(route) {
  // returns { kind, params, isAdmin }
  if (route === "/" || route === "") return { kind: "public-overview", isAdmin: false };
  if (route === "/about") return { kind: "public-about", isAdmin: false };
  if (route === "/claude-code") return { kind: "public-cc", isAdmin: false };
  if (route === "/design-system") return { kind: "design-system", isAdmin: false };
  if (route === "/login") return { kind: "login" };
  if (route === "/auth/callback") return { kind: "auth-callback" };

  let m;
  m = route.match(/^\/services\/([^/]+)\/incidents\/(\d+)$/);
  if (m) return { kind: "public-incident", params: { slug: m[1], id: m[2] }, isAdmin: false };
  m = route.match(/^\/services\/([^/]+)\/incidents$/);
  if (m) return { kind: "public-inc-history", params: { slug: m[1] }, isAdmin: false };
  m = route.match(/^\/services\/([^/]+)$/);
  if (m) return { kind: "public-service", params: { slug: m[1] }, isAdmin: false };

  if (route === "/admin") return { kind: "admin-dashboard", isAdmin: true };
  if (route === "/admin/services") return { kind: "admin-services", isAdmin: true };
  if (route === "/admin/services/new") return { kind: "admin-service-new", isAdmin: true };
  m = route.match(/^\/admin\/services\/([^/]+)$/);
  if (m) return { kind: "admin-service-detail", params: { slug: m[1] }, isAdmin: true };
  if (route === "/admin/incidents") return { kind: "admin-incidents", isAdmin: true };
  m = route.match(/^\/admin\/incidents\/(\d+)$/);
  if (m) return { kind: "admin-incident-review", params: { id: m[1] }, isAdmin: true };
  if (route === "/admin/claude-code") return { kind: "admin-cc", isAdmin: true };
  if (route === "/admin/audit-log") return { kind: "admin-audit", isAdmin: true };
  if (route === "/admin/settings") return { kind: "admin-settings", isAdmin: true };

  return { kind: "notfound" };
}

// ── Theme toggle (floating) ───────────────────────────────────
function ThemeToggle({ theme, onToggle }) {
  return (
    <button onClick={onToggle} className="theme-toggle" aria-label="Toggle theme">
      {theme === "dark" ? (
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M6 1.5a.5.5 0 011 0V3a.5.5 0 01-1 0V1.5zM11 2.5l1-1 .7.7-1 1zM2.3 2.2L3 1.5l1 1-.7.7zM1.5 7a.5.5 0 010-1H3a.5.5 0 010 1H1.5zM10 9c0 1.66-1.34 3-3 3S4 10.66 4 9s1.34-3 3-3 3 1.34 3 3zM13.5 7a.5.5 0 010-1H15a.5.5 0 010 1h-1.5zM12 13.5l-1-1 .7-.7 1 1zM3 12.5l-.7.7-1-1 .7-.7zM7 13a.5.5 0 011 0v1.5a.5.5 0 01-1 0V13z"/>
        </svg>
      ) : (
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M6 .278a.77.77 0 01.08.858 7.2 7.2 0 00-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.77.77 0 01.858.43.77.77 0 01-.36.99A8.5 8.5 0 011 8.5C1 4.79 3.395 1.59 6.732.279.696.241.85.247 1.018.278z"/>
        </svg>
      )}
    </button>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, go] = useHashRoute();
  const tick = useLiveTick(t.liveTickRate);
  const [deniedOnce, setDeniedOnce] = useState(false);

  // Resolve `auto` → system pref, with live listener
  const [systemDark, setSystemDark] = useState(() =>
    window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const onChange = (e) => setSystemDark(e.matches);
    mq.addEventListener?.("change", onChange);
    return () => mq.removeEventListener?.("change", onChange);
  }, []);
  const effectiveTheme = t.theme === "auto" ? (systemDark ? "dark" : "light") : t.theme;

  // Apply theme + fonts + accent
  useEffect(() => {
    const root = document.documentElement;
    root.classList.remove("theme-dark", "theme-light");
    root.classList.add("theme-" + effectiveTheme);
    root.style.setProperty("--font-serif", SERIFS[t.serif] || SERIFS["Newsreader"]);
    root.style.setProperty("--font-sans",  SERIFS[t.serif] || SERIFS["Newsreader"]);
    root.style.setProperty("--font-mono",  MONOS[t.mono] || MONOS["JetBrains Mono"]);
    root.style.setProperty("--accent", t.accent);
    // Density
    if (t.density === "compact") {
      root.style.setProperty("--row-h", "36px");
      root.style.setProperty("--row-h-admin", "30px");
    } else if (t.density === "comfy") {
      root.style.setProperty("--row-h", "52px");
      root.style.setProperty("--row-h-admin", "44px");
    } else {
      root.style.setProperty("--row-h", "44px");
      root.style.setProperty("--row-h-admin", "36px");
    }
  }, [effectiveTheme, t.serif, t.mono, t.accent, t.density]);

  // Scroll to top on route change
  useEffect(() => { window.scrollTo(0, 0); }, [route]);

  const resolved = resolveRoute(route);

  let content;
  if (resolved.kind === "login") {
    content = <Login go={go} attemptedDenied={deniedOnce} setDenied={setDeniedOnce} />;
  } else if (resolved.kind === "auth-callback") {
    content = <AuthCallback go={go} />;
  } else if (resolved.isAdmin) {
    const inner = renderAdminContent(resolved, go, tick);
    content = <AdminChrome route={route} go={go}>{inner}</AdminChrome>;
  } else {
    const inner = renderPublicContent(resolved, go, tick);
    content = <PublicChrome route={route} go={go}>{inner}</PublicChrome>;
  }

  return (
    <>
      {content}
      <ThemeToggle theme={effectiveTheme} onToggle={() => setTweak("theme", effectiveTheme === "dark" ? "light" : "dark")} />
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme}
          options={["auto", "dark", "light"]}
          onChange={(v) => setTweak("theme", v)} />
        <TweakColor label="Accent" value={t.accent}
          options={ACCENT_OPTIONS}
          onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Typography" />
        <TweakSelect label="Serif" value={t.serif}
          options={Object.keys(SERIFS)}
          onChange={(v) => setTweak("serif", v)} />
        <TweakSelect label="Monospace" value={t.mono}
          options={Object.keys(MONOS)}
          onChange={(v) => setTweak("mono", v)} />

        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density}
          options={["compact", "regular", "comfy"]}
          onChange={(v) => setTweak("density", v)} />
        <TweakToggle label="Star-field" value={t.starfield}
          onChange={(v) => setTweak("starfield", v)} />

        <TweakSection label="Liveness" />
        <TweakSlider label="Live tick" value={t.liveTickRate}
          min={1} max={30} step={1} unit="s"
          onChange={(v) => setTweak("liveTickRate", v)} />

        <TweakSection label="Reference" />
        <TweakButton label="Open design system →"
          onClick={() => go("/design-system")} />
      </TweaksPanel>
    </>
  );
}

function renderPublicContent(r, go, tick) {
  switch (r.kind) {
    case "public-overview":     return <PublicOverview go={go} tick={tick} />;
    case "public-about":        return <PublicAbout go={go} />;
    case "public-cc":           return <PublicClaudeCode go={go} />;
    case "public-service":      return <PublicServiceDetail slug={r.params.slug} go={go} />;
    case "public-inc-history":  return <PublicIncidentHistory slug={r.params.slug} go={go} />;
    case "public-incident":     return <PublicIncidentDetail slug={r.params.slug} id={r.params.id} go={go} />;
    case "design-system":       return <DesignSystem go={go} />;
    case "notfound":            return <NotFound go={go} />;
    default: return <NotFound go={go} />;
  }
}

function renderAdminContent(r, go, tick) {
  switch (r.kind) {
    case "admin-dashboard":        return <AdminDashboard go={go} tick={tick} />;
    case "admin-services":         return <AdminServices go={go} />;
    case "admin-service-detail":   return <AdminServiceDetail slug={r.params.slug} go={go} />;
    case "admin-service-new":      return <AdminServiceNew go={go} />;
    case "admin-incidents":        return <AdminIncidents go={go} />;
    case "admin-incident-review":  return <AdminIncidentReview id={r.params.id} go={go} />;
    case "admin-cc":               return <AdminClaudeCode go={go} />;
    case "admin-audit":            return <AdminAuditLog go={go} />;
    case "admin-settings":         return <AdminSettings go={go} />;
    default: return <NotFound go={go} />;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

    border-radius: 999px;
    color: var(--fg-2);
    display: flex; align-items: center; justify-content: center;
    cursor: default;
    transition: all 120ms ease;
    z-index: 30;
  }
  .theme-toggle:hover { color: var(--accent); border-color: var(--accent-line); }
</style>
