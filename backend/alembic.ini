# Aglaea Alembic configuration — async engine, asyncpg-only.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is read from environment in alembic/env.py.
# Default is the docker-compose internal hostname; override per-environment.
sqlalchemy.url = postgresql+asyncpg://aglaea:CHANGEME@postgres:5432/aglaea

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
